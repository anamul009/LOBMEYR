<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>LOBMEYR | Member's Salon</title>
    <script>
      // GitHub Pages SPA redirect: forward sub-routes to index.html via query string
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
